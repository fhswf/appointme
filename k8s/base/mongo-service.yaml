apiVersion: v1
kind: Service
metadata:
  annotations:
    gatus.home-operations.com/enabled: "true"
    gatus.home-operations.com/endpoint: |
      group: appointme-dependencies
      interval: 1m
      conditions:
        - "[CONNECTED] == true"
        - "[RESPONSE_TIME] < 500"
  labels:
    io.kompose.service: mongo-appointme
  name: mongo-appointme
  namespace: appointme
spec:
  ports:
    - name: mongo-appointme
      port: 27017
      targetPort: 27017
  selector:
    io.kompose.service: mongo-appointme
