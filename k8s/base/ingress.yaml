apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    gatus.home-operations.com/enabled: "true"
    gatus.home-operations.com/endpoint: |
      group: appointment
      extra-labels:
        app_type: ingress
      interval: 1m
      conditions:
        - "[STATUS] == 200"
        - "[CERTIFICATE_EXPIRATION] > 72h"
        - "[RESPONSE_TIME] < 2000"
    traefik.frontend.passHostHeader: "true"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: myresolver
  name: appointme-ingress
  namespace: appointme
spec:
  rules:
  - host: appointme.example.com
    http:
      paths:
      - backend:
          service:
            name: client
            port:
              number: 80
        path: /
        pathType: Prefix
      - backend:
          service:
            name: appointme
            port:
              number: 5000
        path: /api
        pathType: Prefix
      - backend:
          service:
            name: mcp-server
            port:
              number: 3000
        path: /mcp
        pathType: Prefix
