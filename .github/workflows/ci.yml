name: ci

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  # ── Gate: always runs, determines which pipeline follows ──────────────────
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created:            ${{ steps.release.outputs.releases_created }}
      backend--release_created:    ${{ steps.release.outputs.backend--release_created }}
      client--release_created:     ${{ steps.release.outputs.client--release_created }}
      mcp-server--release_created: ${{ steps.release.outputs.mcp-server--release_created }}
      backend--version:            ${{ steps.release.outputs.backend--version }}
      client--version:             ${{ steps.release.outputs.client--version }}
      mcp-server--version:         ${{ steps.release.outputs.mcp-server--version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install root dependencies
        run: pnpm install --ignore-scripts --workspace-root

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          target-branch: main

  # ── Staging: regular commits → build with cache, sha tag, update dev ──────
  staging:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install root dependencies
        run: pnpm install --ignore-scripts --workspace-root

      - name: Compute image tag
        id: tag
        run: echo "sha=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend ─────────────────────────────────────────────────────────────
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/fhswf/appointme/backend:${{ steps.tag.outputs.sha }}
            ghcr.io/fhswf/appointme/backend:main
          cache-from: type=registry,ref=ghcr.io/fhswf/appointme/backend:cache
          cache-to:   type=registry,ref=ghcr.io/fhswf/appointme/backend:cache,mode=max

      - name: Update Backend dev overlay
        run: node utility/update-kustomize.js backend backend ${{ steps.tag.outputs.sha }}

      # ── Client ──────────────────────────────────────────────────────────────
      - name: Build & Push Client Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client/Dockerfile
          push: true
          tags: |
            ghcr.io/fhswf/appointme/frontend:${{ steps.tag.outputs.sha }}
            ghcr.io/fhswf/appointme/frontend:main
          cache-from: type=registry,ref=ghcr.io/fhswf/appointme/frontend:cache
          cache-to:   type=registry,ref=ghcr.io/fhswf/appointme/frontend:cache,mode=max

      - name: Update Client dev overlay
        run: node utility/update-kustomize.js client frontend ${{ steps.tag.outputs.sha }}

      # ── MCP Server ──────────────────────────────────────────────────────────
      - name: Build & Push MCP Server Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: mcp-server/Dockerfile
          push: true
          tags: |
            ghcr.io/fhswf/appointme/mcp-server:${{ steps.tag.outputs.sha }}
            ghcr.io/fhswf/appointme/mcp-server:main
          cache-from: type=registry,ref=ghcr.io/fhswf/appointme/mcp-server:cache
          cache-to:   type=registry,ref=ghcr.io/fhswf/appointme/mcp-server:cache,mode=max

      - name: Update MCP Server dev overlay
        run: node utility/update-kustomize.js mcp-server mcp-server ${{ steps.tag.outputs.sha }}

      # ── Commit & push ────────────────────────────────────────────────────────
      - name: Commit kustomize updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            backend/k8s/overlays/dev/kustomization.yaml \
            client/k8s/overlays/dev/kustomization.yaml \
            mcp-server/k8s/overlays/dev/kustomization.yaml
          git diff --cached --quiet || \
            git commit -m "deploy: update dev overlays to ${{ steps.tag.outputs.sha }} [skip ci]"
          git push origin main

  # ── Release: release PR merged → retag :main as semver, update overlays ───
  # No Docker rebuild: the :main image from the last staging run IS the release
  # image. We simply add a semver alias via a registry-side retag (no data
  # transfer), which also guarantees prod runs the exact bits that were tested.
  release:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install root dependencies
        run: pnpm install --ignore-scripts --workspace-root

      - name: Docker Login
        if: ${{ needs.release-please.outputs.backend--release_created == 'true' || needs.release-please.outputs.client--release_created == 'true' || needs.release-please.outputs.mcp-server--release_created == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ needs.release-please.outputs.backend--release_created == 'true' || needs.release-please.outputs.client--release_created == 'true' || needs.release-please.outputs.mcp-server--release_created == 'true' }}
        uses: docker/setup-buildx-action@v3

      # ── Backend: retag :main → semver (registry-side, no rebuild) ───────────
      - name: Retag Backend as release version
        if: ${{ needs.release-please.outputs.backend--release_created == 'true' }}
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/fhswf/appointme/backend:${{ needs.release-please.outputs.backend--version }} \
            ghcr.io/fhswf/appointme/backend:main

      - name: Update Backend Kustomize
        if: ${{ needs.release-please.outputs.backend--release_created == 'true' }}
        run: |
          node utility/update-kustomize.js backend backend ${{ needs.release-please.outputs.backend--version }}
          GITHUB_REF_NAME=prod node utility/update-kustomize.js backend backend ${{ needs.release-please.outputs.backend--version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "deploy: update backend kustomize to version ${{ needs.release-please.outputs.backend--version }} [skip ci]" || echo "No changes to commit"

      # ── Client: retag :main → semver (registry-side, no rebuild) ────────────
      - name: Retag Client as release version
        if: ${{ needs.release-please.outputs.client--release_created == 'true' }}
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/fhswf/appointme/frontend:${{ needs.release-please.outputs.client--version }} \
            ghcr.io/fhswf/appointme/frontend:main

      - name: Update Client Kustomize
        if: ${{ needs.release-please.outputs.client--release_created == 'true' }}
        run: |
          node utility/update-kustomize.js client frontend ${{ needs.release-please.outputs.client--version }}
          GITHUB_REF_NAME=prod node utility/update-kustomize.js client frontend ${{ needs.release-please.outputs.client--version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "deploy: update client kustomize to version ${{ needs.release-please.outputs.client--version }} [skip ci]" || echo "No changes to commit"

      # ── MCP Server: retag :main → semver (registry-side, no rebuild) ────────
      - name: Retag MCP Server as release version
        if: ${{ needs.release-please.outputs.mcp-server--release_created == 'true' }}
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/fhswf/appointme/mcp-server:${{ needs.release-please.outputs.mcp-server--version }} \
            ghcr.io/fhswf/appointme/mcp-server:main

      - name: Update MCP Kustomize
        if: ${{ needs.release-please.outputs.mcp-server--release_created == 'true' }}
        run: |
          node utility/update-kustomize.js mcp-server mcp-server ${{ needs.release-please.outputs.mcp-server--version }}
          GITHUB_REF_NAME=prod node utility/update-kustomize.js mcp-server mcp-server ${{ needs.release-please.outputs.mcp-server--version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "deploy: update mcp-server kustomize to version ${{ needs.release-please.outputs.mcp-server--version }} [skip ci]" || echo "No changes to commit"

      # ── Finalize ─────────────────────────────────────────────────────────────
      - name: Push Kustomize Updates and Fast-Forward Prod
        run: |
          git pull --rebase -X ours origin main
          git push origin main
          git push origin main:prod --force
