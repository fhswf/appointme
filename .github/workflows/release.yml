name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install root dependencies
        run: pnpm install --ignore-scripts --workspace-root

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          target-branch: main

      # ========== BACKEND PIPELINE ==========
      - name: Docker Login
        if: ${{ steps.release.outputs.backend--release_created || steps.release.outputs.client--release_created || steps.release.outputs.mcp-server--release_created }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend Docker Image
        if: ${{ steps.release.outputs.backend--release_created }}
        run: |
          docker build -t ghcr.io/fhswf/appointme/backend:${{ steps.release.outputs.backend--version }} -f backend/Dockerfile .
          docker push ghcr.io/fhswf/appointme/backend:${{ steps.release.outputs.backend--version }}

      - name: Update Backend Kustomize
        if: ${{ steps.release.outputs.backend--release_created }}
        run: |
          node utility/update-kustomize.js backend backend ${{ steps.release.outputs.backend--version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "deploy: update backend kustomize to version ${{ steps.release.outputs.backend--version }} [skip ci]" || echo "No changes to commit"

      # ========== CLIENT PIPELINE ==========
      - name: Build & Push Client Docker Image
        if: ${{ steps.release.outputs.client--release_created }}
        run: |
          docker build -t ghcr.io/fhswf/appointme/frontend:${{ steps.release.outputs.client--version }} -f client/Dockerfile .
          docker push ghcr.io/fhswf/appointme/frontend:${{ steps.release.outputs.client--version }}

      - name: Update Client Kustomize
        if: ${{ steps.release.outputs.client--release_created }}
        run: |
          node utility/update-kustomize.js client frontend ${{ steps.release.outputs.client--version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "deploy: update client kustomize to version ${{ steps.release.outputs.client--version }} [skip ci]" || echo "No changes to commit"

      # ========== MCP-SERVER PIPELINE ==========
      - name: Build & Push MCP Docker Image
        if: ${{ steps.release.outputs.mcp-server--release_created }}
        run: |
          docker build -t ghcr.io/fhswf/appointme/mcp-server:${{ steps.release.outputs.mcp-server--version }} -f mcp-server/Dockerfile .
          docker push ghcr.io/fhswf/appointme/mcp-server:${{ steps.release.outputs.mcp-server--version }}

      - name: Update MCP Kustomize
        if: ${{ steps.release.outputs.mcp-server--release_created }}
        run: |
          node utility/update-kustomize.js mcp-server mcp-server ${{ steps.release.outputs.mcp-server--version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "deploy: update mcp-server kustomize to version ${{ steps.release.outputs.mcp-server--version }} [skip ci]" || echo "No changes to commit"

      # ========== FINALIZE PIPELINE ==========
      - name: Push Kustomize Updates and Fast-Forward Prod
        if: ${{ steps.release.outputs.releases_created }}
        run: |
          git pull --rebase origin main
          git push origin main
          git push origin main:prod --force
