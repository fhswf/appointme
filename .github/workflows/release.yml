name: release (manual)

# Manual re-run of the release deployment pipeline.
# Use this when the automatic ci.yml release job failed after a release PR
# was already merged and the versions are known.
# release-please is NOT run here — versions are provided as inputs.
# Optional source tags allow you to promote a tested immutable image such as
# sha-abc123 instead of rebuilding or relying on the moving :main tag.

on:
  workflow_dispatch:
    inputs:
      backend_version:
        description: "Backend version to deploy (e.g. 1.43.5), leave empty to skip"
        required: false
      backend_source_tag:
        description: "Backend source image tag to promote (e.g. sha-abc123, defaults to main)"
        required: false
        default: "main"
      client_version:
        description: "Client version to deploy (e.g. 1.39.2), leave empty to skip"
        required: false
      client_source_tag:
        description: "Client source image tag to promote (e.g. sha-abc123, defaults to main)"
        required: false
        default: "main"
      mcp_server_version:
        description: "MCP Server version to deploy (e.g. 1.2.5), leave empty to skip"
        required: false
      mcp_server_source_tag:
        description: "MCP source image tag to promote (e.g. sha-abc123, defaults to main)"
        required: false
        default: "main"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install root dependencies
        run: pnpm install --ignore-scripts --workspace-root

      - name: Docker Login
        if: ${{ inputs.backend_version != '' || inputs.client_version != '' || inputs.mcp_server_version != '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ inputs.backend_version != '' || inputs.client_version != '' || inputs.mcp_server_version != '' }}
        uses: docker/setup-buildx-action@v3

      # ── Backend ─────────────────────────────────────────────────────────────
      - name: Retag Backend Docker Image
        if: ${{ inputs.backend_version != '' }}
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/fhswf/appointme/backend:${{ inputs.backend_version }} \
            ghcr.io/fhswf/appointme/backend:${{ inputs.backend_source_tag }}

      - name: Update Backend Kustomize
        if: ${{ inputs.backend_version != '' }}
        run: |
          node utility/update-kustomize.js backend backend ${{ inputs.backend_version }}
          GITHUB_REF_NAME=prod node utility/update-kustomize.js backend backend ${{ inputs.backend_version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "deploy: update backend kustomize to version ${{ inputs.backend_version }} [skip ci]" || echo "No changes to commit"

      # ── Client ──────────────────────────────────────────────────────────────
      - name: Retag Client Docker Image
        if: ${{ inputs.client_version != '' }}
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/fhswf/appointme/frontend:${{ inputs.client_version }} \
            ghcr.io/fhswf/appointme/frontend:${{ inputs.client_source_tag }}

      - name: Update Client Kustomize
        if: ${{ inputs.client_version != '' }}
        run: |
          node utility/update-kustomize.js client frontend ${{ inputs.client_version }}
          GITHUB_REF_NAME=prod node utility/update-kustomize.js client frontend ${{ inputs.client_version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "deploy: update client kustomize to version ${{ inputs.client_version }} [skip ci]" || echo "No changes to commit"

      # ── MCP Server ──────────────────────────────────────────────────────────
      - name: Retag MCP Docker Image
        if: ${{ inputs.mcp_server_version != '' }}
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/fhswf/appointme/mcp-server:${{ inputs.mcp_server_version }} \
            ghcr.io/fhswf/appointme/mcp-server:${{ inputs.mcp_server_source_tag }}

      - name: Update MCP Kustomize
        if: ${{ inputs.mcp_server_version != '' }}
        run: |
          node utility/update-kustomize.js mcp-server mcp-server ${{ inputs.mcp_server_version }}
          GITHUB_REF_NAME=prod node utility/update-kustomize.js mcp-server mcp-server ${{ inputs.mcp_server_version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "deploy: update mcp-server kustomize to version ${{ inputs.mcp_server_version }} [skip ci]" || echo "No changes to commit"

      # ── Finalize ─────────────────────────────────────────────────────────────
      - name: Push Kustomize Updates and Fast-Forward Prod
        run: |
          git pull --rebase -X ours origin main
          git push origin main
          git push origin main:prod --force
